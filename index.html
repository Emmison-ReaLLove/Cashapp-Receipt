<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Receipt</title>

<style>
:root {
    --green: #00D54B;
    --gray: #8E8E93;
}

/* Prevent scroll */
html, body {
    height: 100%;
    overflow: hidden;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

/* App */
.app {
    max-width: 420px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;

    padding: calc(16px + env(safe-area-inset-top)) 16px
             calc(10px + env(safe-area-inset-bottom));
    box-sizing: border-box;
}

/* Top */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    
}

/* Content layout */
.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-align: center;
    margin-top: 20px;
}

/* Middle center */
.middle {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex: 1;
}

/* Profile */
.profile {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
}

.name {
    font-size: 22px;
    font-weight: 700;
    margin-top: 14px;
}

.subtitle {
    font-size: 20px;
    color: var(--gray);
    margin-top: 6px;
}

.amount {
    font-size: 55px;
    font-weight: 800;
    letter-spacing: -1px;
}

.time {
    font-size: 18px;
    color: var(--gray);
    margin-top: 8px;
}

/* Bottom */
.bottom {
    display: flex;
    flex-direction: column;
}

/* Buttons */
.primary-btn {
    background: var(--green);
    color: #fff;
    border: none;
    width: 100%;
    padding: 20px;
    border-radius: 40px;
    font-size: 18px;
    font-weight: 600;
    margin-top: 10px;
}

.secondary-btn {
    border: 1.5px solid #E5E5EA;
    width: 100%;
    padding: 18px;
    border-radius: 40px;
    font-size: 17px;
    margin-top: 14px;
    color: black;
    font-weight:bold;
    background: transparent;
}

/* Nav */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-bottom: env(safe-area-inset-bottom);
}

.nav svg {
    width: 26px;
    height: 26px;
}

#navAmount {
    font-size: 18px;
    color: var(--gray);
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: flex-end;
}

.popup-card {
    background: #fff;
    width: 100%;
    max-width: 420px;
    border-radius: 20px 20px 0 0;
    padding: 20px;
}

.popup-card input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.popup-card button {
    margin-top: 15px;
    width: 100%;
    padding: 14px;
    border-radius: 20px;
    background: var(--green);
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="app">

<!-- Top -->
<div class="top-bar">
    <svg viewBox="0 0 22 22" width="30" height="30" fill="none" stroke="#000" stroke-width="2.2">
        <path d="M15.5 5l-7 7 7 7"/>
    </svg>

    <div onclick="openPopup()">
        <svg viewBox="0 0 22 22" width="30" height="30" fill="#000">
            <circle cx="5" cy="12" r="1.6"/>
            <circle cx="12" cy="12" r="1.6"/>
            <circle cx="19" cy="12" r="1.6"/>
        </svg>
    </div>
</div>

<!-- Content -->
<div class="content">

    <!-- Top info -->
    <div>
        <img id="profile" class="profile" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">
        <div id="namE" class="name">De_Guzzman</div>
        <div id="tag" class="subtitle">Payment to $De_Guzzman99</div>
    </div>

    <!-- CENTER -->
    <div class="middle">
        <div id="amount" class="amount">$00.00</div>
        <div id="time" class="time">Today at 0:00 PM</div>
    </div>

</div>

<!-- Bottom -->
<div class="bottom">

    <button class="primary-btn">✓ Completed</button>
    <button class="secondary-btn">Web Receipt</button>

    <!-- NAV (YOUR ORIGINAL ICONS UNCHANGED) -->
    <div class="nav">

        <div id="navAmount">$0.00</div>

        <svg viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="#8E8E93" stroke-width="2.3"/>
            <circle cx="8" cy="8" r="1.6" fill="#8E8E93"/>
        </svg>

        <svg viewBox="0 0 22 22" width="24" height="24">
                <g transform="rotate(8 11 11) scale(1.05)">
                    <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"
                          fill="#8E8E93"/>
                </g>
            </svg>  

        <svg viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#8E8E93" stroke-width="2.3"/>
            <line x1="16.5" y1="16.5" x2="20.5" y2="20.5"
                stroke="#8E8E93" stroke-width="2.3" stroke-linecap="round"/>
        </svg>

        <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="#000" stroke-width="2.3"/>
            <path d="M12 7.5V12L15 13.8"
                stroke="#000" stroke-width="2.3" stroke-linecap="round"/>
        </svg>

    </div>

</div>

</div>

<!-- Popup -->
<div id="popup" class="popup">
    <div class="popup-card">
        <input id="pName" placeholder="Name">
        <input id="pTag" placeholder="Payment tag">
        <input id="pMainAmount" placeholder="Amount transfering">
        <input id="pNavAmount" placeholder="Current Balance">
        <input type="file" id="pImage" accept="image/*">
        <button onclick="applyData()">Done</button>
    </div>
</div>

<script>
function openPopup(){ popup.style.display="flex"; }
function closePopup(){ popup.style.display="none"; }

function getUSATime(){
    return "Today at " + new Date().toLocaleTimeString("en-US", {
        timeZone:"America/New_York",
        hour:"numeric",
        minute:"2-digit",
        hour12:true
    });
}

function applyData(){
    if(pName.value) namE.textContent = pName.value;
    if(pTag.value) tag.textContent = "Payment to " + pTag.value;

    if(pMainAmount.value)
        amount.textContent = "$" + Number(pMainAmount.value).toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
});

    if(pNavAmount.value)
        navAmount.textContent = "$" + Number(pNavAmount.value).toLocaleString();

    time.textContent = getUSATime();

    const file = pImage.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = e => profile.src = e.target.result;
        reader.readAsDataURL(file);
    }

    closePopup();
}

setInterval(()=>{
    time.textContent = getUSATime();
},1000);
</script>

</body>
</html>
