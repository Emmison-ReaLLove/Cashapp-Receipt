<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Receipt</title>

<style>
:root {
    --green: #00D54B;
    --gray: #8E8E93;
}

/* Base */
body {
    margin: 0;
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* App container */
.app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;

    padding-top: calc(16px + env(safe-area-inset-top));
    padding-left: 16px;
    padding-right: 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

/* Top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Content */
.content {
    text-align: center;
    margin-top: 48px;
}

.profile {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
}

.name {
    font-size: 22px;
    font-weight: 700;
    margin-top: 14px;
}

.subtitle {
    font-size: 15px;
    color: var(--gray);
    margin-top: 6px;
}

.amount {
    font-size: 52px;
    font-weight: 800;
    margin-top: 28px;
    letter-spacing: -1px;
}

.time {
    font-size: 15px;
    color: var(--gray);
    margin-top: 8px;
}

/* Bottom */
.bottom {
    margin-top: auto;
}

/* Buttons */
.primary-btn {
    background: var(--green);
    color: #fff;
    border: none;
    width: 100%;
    padding: 20px;
    border-radius: 40px;
    font-size: 18px;
    font-weight: 600;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;

    margin-top: 40px;
}

.secondary-btn {
    background: transparent;
    border: 1.5px solid #E5E5EA;
    width: 100%;
    padding: 18px;
    border-radius: 40px;
    font-size: 17px;
    font-weight: 500;
    margin-top: 14px;
    color: #007AFF;
}

/* Nav */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;

    margin-top: 28px;
    padding: 10px 6px calc(env(safe-area-inset-bottom) + 4px);
}

.nav svg {
    width: 26px;
    height: 26px;
}

#navAmount {
    font-size: 18px;
    color: var(--gray);
}

/* Button interaction */
button {
    transition: transform 0.1s ease, opacity 0.1s ease;
}

button:active {
    transform: scale(0.97);
    opacity: 0.9;
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: flex-end;
}

.popup-card {
    background: #fff;
    width: 100%;
    max-width: 420px;
    border-radius: 20px 20px 0 0;
    padding: 20px;
}

.popup-card input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.popup-card button {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="app">

<div class="top-bar">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#000" stroke-width="2.2">
        <path d="M15.5 5l-7 7 7 7"/>
    </svg>

    <div onclick="openPopup()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#000">
            <circle cx="5" cy="12" r="1.6"/>
            <circle cx="12" cy="12" r="1.6"/>
            <circle cx="19" cy="12" r="1.6"/>
        </svg>
    </div>
</div>

<div class="content">
    <img id="profile" class="profile" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">

    <div id="name" class="name">De_Guzzman</div>
    <div id="tag" class="subtitle">Payment to $De_Guzzman99</div>

    <div id="amount" class="amount">$00.00</div>
    <div id="time" class="time">Today at 0:00 PM</div>
</div>

<div class="bottom">

    <button class="primary-btn">
        ✓ Completed
    </button>

    <button class="secondary-btn">Web Receipt</button>

    <div class="nav">
        <div id="navAmount">$0.00</div>

        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" stroke="#8E8E93" stroke-width="2.3"/></svg>

        <svg viewBox="0 0 24 24"><text x="6" y="18" font-size="16" fill="#8E8E93">$</text></svg>

        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="#8E8E93" stroke-width="2.3"/></svg>

        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="#000" stroke-width="2.3"/></svg>
    </div>

</div>

</div>

<!-- Popup -->
<div id="popup" class="popup">
    <div class="popup-card">
        <input id="pName" placeholder="Name">
        <input id="pTag" placeholder="Payment tag">
        <input id="pMainAmount" placeholder="Amount">
        <input id="pNavAmount" placeholder="Balance">
        <input type="file" id="pImage" accept="image/*">
        <button onclick="applyData()">Done</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function getUSATime() {
    return "Today at " + new Date().toLocaleTimeString("en-US", {
        timeZone: "America/New_York",
        hour: "numeric",
        minute: "2-digit",
        hour12: true
    });
}

function applyData() {
    const name = pName.value;
    const tag = pTag.value;
    const mainAmount = pMainAmount.value;
    const navAmount = pNavAmount.value;

    if (name) nameEl.textContent = name;
    if (tag) tagEl.textContent = "Payment to " + tag;

    if (mainAmount) amountEl.textContent = "$" + Number(mainAmount).toLocaleString();
    if (navAmount) navAmountEl.textContent = "$" + Number(navAmount).toLocaleString();

    timeEl.textContent = getUSATime();

    const file = pImage.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => profile.src = e.target.result;
        reader.readAsDataURL(file);
    }

    closePopup();
}

setInterval(() => {
    timeEl.textContent = getUSATime();
}, 1000);
</script>

</body>
</html>
