<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Receipt</title>

<style>
:root {
    --green: #00D54B;
    --gray: #8E8E93;
    --light-gray: #F2F2F7;
}

body {
    margin: 0;
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
}

/* App container */
.app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;

    padding-top: calc(20px + env(safe-area-inset-top));
    padding-left: 16px;
    padding-right: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));

    box-sizing: border-box;
}

/* Top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Center */
.content {
    text-align: center;
    margin-top: 56px;
}

.profile {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
}

.name {
    font-size: 22px;
    font-weight: 700;
    margin-top: 12px;
    letter-spacing: -0.2px;
}

.subtitle {
    font-size: 15px;
    color: var(--gray);
    margin-top: 6px;
}

.amount {
    font-size: 48px;
    font-weight: 800;
    margin-top: 26px;
    letter-spacing: -0.5px;
}

.time {
    font-size: 15px;
    color: var(--gray);
    margin-top: 10px;
}

/* Bottom */
.bottom {
    margin-top: auto;
    padding-bottom: 20px;
}
    
.primary-btn {
    background: var(--green);
    color: #fff;
    border: none;
    width: 100%;
    padding: 18px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 600;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position:relative;
    top:-20px;
}

.secondary-btn {
    background: transparent;
    border: 1.5px solid #E5E5EA;
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 500;
    margin-top: 12px;
    position:relative;
    top:-20px;
    color:black;
}

/* Nav */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 6px 6px calc(env(safe-area-inset-bottom) - 4px);
}

.nav svg {
    width: 28px;
    height: 28px;
}

/* Small screens */
@media (max-height: 700px) {
    .content {
        margin-top: 30px;
    }
}

/* Popup background */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: flex-end;
    z-index: 999;
}

/* Popup card (iOS style) */
.popup-card {
    background: #fff;
    width: 100%;
    max-width: 420px;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    box-sizing: border-box;
    animation: slideUp 0.3s ease;
}

.popup-card h3 {
    margin-top: 0;
    text-align: center;
}

.popup-card input {
    width: 90%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.popup-card button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 20px;
    border: none;
    background: var(--green);
    color: #fff;
    font-weight: 600;
}

/* Animation */
@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

</style>
</head>

<body>

<div class="app">

    <!-- Top Bar -->
    <div class="top-bar">

        <!-- Back -->
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.5 5l-7 7 7 7"/>
        </svg>

        <!-- Menu -->
                <!-- Menu (horizontal dots) -->
                <div onclick="openPopup()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#000">
                        <circle cx="5" cy="12" r="1.6"/>
                        <circle cx="12" cy="12" r="1.6"/>
                        <circle cx="19" cy="12" r="1.6"/>
                    </svg>
                </div>

    </div>

    <!-- Content -->
    <div class="content">

        <img id="profile" class="profile"
        src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">

        <div id="name" class="name">De_Guzzman</div>
        <div id="tag" class="subtitle">Payment to $De_Guzzman99</div>

      <div style="position:relative;top:30px">
        <div id="amount" class="amount">$00.00</div>
        <div id="time" class="time">Today at 0:00 PM</div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">

        <button class="primary-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 13l4 4L19 7"/>
            </svg>
            Completed
        </button>

        <button class="secondary-btn">Web Receipt</button>

        <!-- Navigation -->
        <div class="nav">

            <div id="navAmount" style="font-size:18px; font-weight:500; color:#8E8E93;">$0.00</div>        
            <!-- Square -->
            <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="5" stroke="#8E8E93" stroke-width="2.3"/>
                <circle cx="8" cy="8" r="1.6" fill="#8E8E93"/>
            </svg>
        
            <!-- Cash App $ -->
            <svg viewBox="0 0 22 22" width="24" height="24">
                <g transform="rotate(8 11 11) scale(1.05)">
                    <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"
                          fill="#8E8E93"/>
                </g>
            </svg>  
        
            <!-- Search -->
            <svg viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7" stroke="#8E8E93" stroke-width="2.3"/>
                <line x1="16.5" y1="16.5" x2="20.5" y2="20.5"
                      stroke="#8E8E93" stroke-width="2.3" stroke-linecap="round"/>
            </svg>
        
            <!-- Clock -->
                        <!-- Clock (ACTIVE) -->
            <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="#000" stroke-width="2.3"/>
                <path d="M12 7.5V12L15 13.8"
                    stroke="#000" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        
        </div>
    </div>

</div>
<!-- POPUP MODAL -->
<div id="popup" class="popup">
    <div class="popup-card">
      
      <h3>Edit Receipt</h3>
  
      <input id="pName" placeholder="Name">
      <input id="pTag" placeholder="Payment tag">
      <input id="pMainAmount" placeholder="Amount Transfering">
      <input id="pNavAmount" placeholder="Current Balance">
  
      <input type="file" id="pImage" accept="image/*">
  
      <button onclick="applyData()">Done</button>
  
    </div>
  </div>
  <script>
    // Open popup
    function openPopup() {
        document.getElementById("popup").style.display = "flex";
    }
    
    // Close popup
    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }
    
    // USA TIME
    function getUSATime() {
        const options = {
            timeZone: "America/New_York",
            hour: "numeric",
            minute: "2-digit",
            hour12: true
        };
        return "Today at " + new Date().toLocaleTimeString("en-US", options);
    }
    
    // Apply data
    function applyData() {
        const name = document.getElementById("pName").value;
        const tag = document.getElementById("pTag").value;
        const mainAmount = document.getElementById("pMainAmount").value;
        const navAmount = document.getElementById("pNavAmount").value;
    
        if (name) document.getElementById("name").textContent = name;
        if (tag) document.getElementById("tag").textContent = "Payment to " + tag;
    
        if (mainAmount) {
            document.getElementById("amount").textContent =
                "$" + Number(mainAmount).toLocaleString();
        }
    
        if (navAmount) {
            document.getElementById("navAmount").textContent =
                "$" + Number(navAmount).toLocaleString();
        }
    
        // Time
        document.getElementById("time").textContent = getUSATime();
    
        // Image
        const file = document.getElementById("pImage").files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("profile").src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    
        closePopup();
    }
    
    // Live USA time
    setInterval(() => {
        document.getElementById("time").textContent = getUSATime();
    }, 1000);
    </script>
        <script>
        // ✅ Create hidden file input ONCE
        const imageInput = document.createElement("input");
        imageInput.type = "file";
        imageInput.accept = "image/*";
        imageInput.style.display = "none";
        document.body.appendChild(imageInput);
        
        // ✅ When image is tapped → open gallery
        document.getElementById("profile").addEventListener("click", () => {
            imageInput.click(); // ✅ This works on iPhone (user-triggered)
        });
        
        // ✅ When user selects image → display it
        imageInput.addEventListener("change", function () {
            const file = this.files[0];
        
            if (file) {
                const reader = new FileReader();
        
                reader.onload = function (e) {
                    document.getElementById("profile").src = e.target.result;
                };
        
                reader.readAsDataURL(file);
            }
        });
        </script>
        <script>
            if ("serviceWorker" in navigator) {
              navigator.serviceWorker.register("service-worker.js")
                .then(() => console.log("PWA ready"))
                .catch(err => console.log(err));
            }
         </script>
</body>
</html>
